# Example configuration for target yield strategy

backtest:
  name: "QQQ_Target_Yield"
  start_date: "2020-01-01"
  end_date: "2024-12-31"
  initial_capital: 10000000
  currency: "USD"

strategy:
  type: "covered_call"
  name: "15% Target Yield Strategy"
  
  # Target yield mode - dynamically select moneyness to hit yield target
  target_yield: 0.15  # 15% annualized yield target
  coverage_ratio: 1.0  # Will be adjusted dynamically based on yield
  roll_frequency: "weekly"
  days_to_expiration: 7
  
  rebalance_rule: "O"
  use_bid_ask: true

data:
  provider: "csv"
  data_dir: "data"
  
  equity:
    ticker: "QQQ"
    file: "equity/QQQ.csv"
  
  options:
    ticker: "QQQ"
    file: "options/QQQ_options.csv"

output:
  save_results: true
  output_dir: "output"
  generate_plots: true
  save_trades: true
